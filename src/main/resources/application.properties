spring.application.name=msgRestApi

# Surcharges personnelles (identifiants MySQL) — fichier gitignoré
spring.config.import=optional:classpath:application-local.properties

# MySQL local (chaque membre adapte user/mot de passe dans application-local.properties)
spring.datasource.url=jdbc:mysql://localhost:3306/msgdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Paris
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Désactive l'exposition automatique des repositories (API REST custom)
spring.data.rest.detection-strategy=annotated

# Contrainte métier (US backlog)
app.message.max-length=500

# US8 — Fichiers de discussion
app.file.storage-dir=uploads/files
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# JWT — surcharger le secret en local (min. 32 caractères)
app.jwt.secret=msgRestApi-dev-secret-key-minimum-32-characters-long
app.jwt.expiration-seconds=86400

# Mail (US4 — notifications hors ligne, ex. MailHog en local sur le port 1025)
spring.mail.host=localhost
spring.mail.port=1025
app.mail.from=noreply@msgrestapi.local
app.presence.offline-threshold-minutes=5
