spring.application.name=msgRestApi

# Base H2 (dev) — à remplacer par PostgreSQL en prod
spring.datasource.url=jdbc:h2:mem:msgdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Désactive l'exposition automatique des repositories (API REST custom)
spring.data.rest.detection-strategy=annotated

# Contrainte métier (US backlog)
app.message.max-length=500

# Mail (US4 — notifications hors ligne)
spring.mail.host=localhost
spring.mail.port=1025
